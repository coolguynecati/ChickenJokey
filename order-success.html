<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Спасибо за заказ</title>
  <link rel="shortcut icon" href="images/favicon.ico">
  <style>
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:#0d0d0f; color:#f5f5f5; font-family:Montserrat,Arial,sans-serif; }
    .card { max-width:560px; width:92vw; background:rgba(20,20,24,.9); border:1px solid rgba(255,255,255,.1); border-radius:16px; padding:24px; text-align:center; }
    h1 { margin:0 0 10px; font-size:1.5rem; }
    p { color:#c9c9ce; margin:0 0 10px; line-height:1.55; }
    .num { color:#ff6a1a; font-weight:700; font-size:1.1rem; margin:12px 0 18px; }
    a { display:inline-block; padding:10px 14px; border-radius:999px; background:#ff6a1a; color:#fff; text-decoration:none; font-weight:700; margin-top:8px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Спасибо! Заказ принят.</h1>
    <p>Мы получили заявку и скоро свяжемся с вами для подтверждения.</p>
    <p class="num" id="orderNum"></p>
    <a href="index.html">Вернуться в меню</a>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    let num = params.get('order');
    if (!num) {
      try {
        const last = JSON.parse(localStorage.getItem('emika-last-order') || '{}');
        num = last.orderNumber;
      } catch (e) {}
    }
    document.getElementById('orderNum').textContent = num ? `Номер заказа: ${num}` : '';
  </script>
</body>
</html>
