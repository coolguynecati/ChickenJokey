services:
  - type: web
    name: emikashotchicken-shop
    runtime: node
    rootDir: shop
    plan: free
    buildCommand: npm ci --omit=dev || npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: CRM_PASSWORD
        generateValue: true
