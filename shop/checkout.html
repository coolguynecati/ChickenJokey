<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оформление заказа — Emika's</title>
  <link rel="shortcut icon" href="/images/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <script>
    (function () {
      const saved = localStorage.getItem('emika-theme');
      document.documentElement.setAttribute('data-theme', saved === 'light' || saved === 'dark' ? saved : 'dark');
    })();
  </script>
  <script>
    (function () {
      var fb = 'https://chickenjokey.onrender.com';
      if (typeof window.emikaApiUrl !== 'function') {
        window.emikaApiUrl = function (p) { return new URL(p, fb).href; };
        window.emikaApiReady = Promise.resolve(fb);
      }
    })();
  </script>
  <script src="emika-guard.js"></script>
  <script src="emika-api.js"></script>
  <style>
    :root {
      --orange: #ff6a1a;
      --orange-dark: #e2550f;
      --bg: #0d0d0f;
      --card: rgba(20, 20, 24, 0.92);
      --text: #f5f5f5;
      --muted: #c9c9ce;
      --border: rgba(255, 255, 255, 0.1);
      --input-bg: rgba(255, 255, 255, 0.06);
      --input-border: rgba(255, 255, 255, 0.16);
      --dropdown-bg: #1a1b22;
      --dropdown-shadow: 0 10px 28px rgba(0, 0, 0, 0.45);
      --item-hover: rgba(255, 106, 26, 0.14);
      --slot-h: 40px;
      --slots-visible: 5;
    }

    html[data-theme="light"] {
      --bg: #f6f6f7;
      --card: rgba(255, 255, 255, 0.96);
      --text: #121316;
      --muted: #545863;
      --border: rgba(0, 0, 0, 0.1);
      --input-bg: #ffffff;
      --input-border: rgba(0, 0, 0, 0.14);
      --dropdown-bg: #ffffff;
      --dropdown-shadow: 0 10px 28px rgba(0, 0, 0, 0.12);
      --item-hover: rgba(255, 106, 26, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
    }

    html[data-theme="dark"] body {
      background: #0d0d0f url('/images/background.jpg') center top / cover no-repeat fixed;
    }

    html[data-theme="dark"] body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.72));
      z-index: 0;
    }

    html[data-theme="light"] body::before { display: none; }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 920px;
      margin: 0 auto;
      padding: 16px 12px 32px;
    }

    h1 { margin: 0 0 10px; font-size: 1.35rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      backdrop-filter: blur(8px);
    }
    .card h3 { margin: 0 0 10px; font-size: 1rem; }
    .items { display: grid; gap: 8px; }
    .cart-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }
    .cart-card-head h3 { margin: 0; }
    .btn-clear-cart {
      border: 1px solid var(--input-border);
      background: transparent;
      color: var(--muted);
      border-radius: 999px;
      padding: 5px 10px;
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-clear-cart:hover:not(:disabled) {
      color: #e85c5c;
      border-color: rgba(232, 92, 92, 0.45);
    }
    .btn-clear-cart:disabled { opacity: 0.45; cursor: not-allowed; }
    .item {
      display: grid;
      grid-template-columns: 52px 1fr auto;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 6px;
    }
    .item img {
      width: 52px;
      height: 52px;
      object-fit: contain;
      border-radius: 6px;
      background: var(--input-bg);
    }
    .item-main { min-width: 0; font-size: 0.9rem; line-height: 1.35; }
    .item-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }
    .qty {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .qty button {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      border: 1px solid var(--input-border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-size: 0.85rem;
      line-height: 1;
      padding: 0;
    }
    .qty button:hover { border-color: rgba(255, 106, 26, 0.45); }
    .qty-input {
      width: 30px;
      height: 22px;
      border-radius: 4px;
      border: 1px solid var(--input-border);
      background: transparent;
      color: var(--text);
      text-align: center;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 0 2px;
      -moz-appearance: textfield;
    }
    .qty-input::-webkit-outer-spin-button,
    .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .item-remove {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      border: 1px solid rgba(255, 107, 107, 0.35);
      background: transparent;
      color: #ff8080;
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1;
      padding: 0;
    }
    .item-remove:hover {
      background: rgba(255, 107, 107, 0.2);
      border-color: rgba(255, 107, 107, 0.55);
    }
    html[data-theme="light"] .item-remove {
      color: #c62828;
      border-color: rgba(198, 40, 40, 0.35);
      background: rgba(198, 40, 40, 0.08);
    }
    .muted { color: var(--muted); font-size: 0.85rem; }
    .total { font-size: 1.1rem; font-weight: 700; color: var(--orange); margin-top: 8px; }
    .recommendations {
      margin-top: 8px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.03);
    }
    html[data-theme="light"] .recommendations {
      background: rgba(0, 0, 0, 0.025);
    }
    .recommendations h4 {
      margin: 0 0 6px;
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .recommendations-hint {
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 0.75rem;
      line-height: 1.35;
    }
    .recommendations-line {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(132px, 1fr);
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 1px;
      overscroll-behavior-x: contain;
    }
    .recommendation-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.02);
      padding: 7px;
      display: grid;
      gap: 5px;
    }
    html[data-theme="light"] .recommendation-card {
      background: rgba(0, 0, 0, 0.02);
    }
    .recommendation-card img {
      width: 100%;
      height: 58px;
      object-fit: contain;
      border-radius: 6px;
      background: var(--input-bg);
    }
    .recommendation-title {
      font-size: 0.74rem;
      font-weight: 600;
      line-height: 1.3;
      min-height: 1.9em;
    }
    .recommendation-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .recommendation-price {
      font-size: 0.76rem;
      color: var(--orange);
      font-weight: 700;
    }
    .recommendation-add {
      border: 1px solid rgba(255, 106, 26, 0.5);
      background: transparent;
      color: var(--text);
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 0.7rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
    }
    .recommendation-add:hover {
      border-color: var(--orange);
      background: rgba(255, 106, 26, 0.12);
    }
    .recommendation-add.is-added {
      background: rgba(255, 106, 26, 0.2);
      border-color: var(--orange);
    }
    .item.cart-flash {
      animation: cartFlash 0.42s ease;
    }
    @keyframes cartFlash {
      0% { box-shadow: 0 0 0 0 rgba(255, 106, 26, 0.55); }
      100% { box-shadow: 0 0 0 10px rgba(255, 106, 26, 0); }
    }
    .fly-chip {
      position: fixed;
      z-index: 9999;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      pointer-events: none;
      background-size: cover;
      background-position: center;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.32);
    }
    .recommendations-empty {
      margin: 0;
      color: var(--muted);
      font-size: 0.78rem;
    }
    h1 {
      font-family: 'Dela Gothic One', cursive;
      font-size: 1.2rem;
      letter-spacing: 0.02em;
    }
    .field { margin-bottom: 10px; }
    .field > label {
      display: block;
      font-size: 0.8rem;
      margin: 0 0 4px;
      color: var(--muted);
      font-weight: 600;
    }
    input, textarea {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text);
      padding: 8px 10px;
      font-family: inherit;
      font-size: 0.9rem;
    }
    input::placeholder, textarea::placeholder { color: var(--muted); opacity: 0.85; }
    textarea { min-height: 56px; resize: vertical; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .inline-choices { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; }
    .inline-choices label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 0;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
    }
    .inline-choices input { width: auto; margin: 0; accent-color: var(--orange); }
    .actions { margin-top: 10px; }
  button[type="submit"] {
      width: 100%;
      padding: 11px 14px;
      border-radius: 999px;
      border: none;
      background: var(--orange);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
    }
    button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }
    .back-to-menu {
      display: inline-block;
      margin-bottom: 12px;
      color: var(--orange);
      font-weight: 700;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .error { color: #e85c5c; font-size: 0.85rem; display: none; margin-top: 6px; }
    html[data-theme="light"] .error { color: #c62828; }
    .pickup-point {
      margin: 0 0 8px;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(255, 106, 26, 0.08);
      border: 1px solid rgba(255, 106, 26, 0.22);
      font-size: 0.85rem;
    }
    .pickup-point strong { color: var(--orange); }

    /* Custom time dropdown */
    .pickup-select { position: relative; }
    .pickup-select__trigger {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 9px 11px;
      border-radius: 8px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
    }
    .pickup-select__trigger:hover { border-color: rgba(255, 106, 26, 0.45); }
    .pickup-select.is-open .pickup-select__trigger {
      border-color: rgba(255, 106, 26, 0.65);
      box-shadow: 0 0 0 2px rgba(255, 106, 26, 0.15);
    }
    .pickup-select__chevron {
      flex-shrink: 0;
      font-size: 0.65rem;
      color: var(--muted);
      transition: transform 0.2s;
    }
    .pickup-select.is-open .pickup-select__chevron { transform: rotate(180deg); }
    .pickup-select__panel {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 4px);
      z-index: 30;
      display: none;
      border-radius: 8px;
      border: 1px solid var(--input-border);
      background: var(--dropdown-bg);
      box-shadow: var(--dropdown-shadow);
      overflow: hidden;
    }
    .pickup-select.is-open .pickup-select__panel { display: block; }
    .pickup-select__list {
      list-style: none;
      margin: 0;
      padding: 4px;
      max-height: calc(var(--slot-h) * var(--slots-visible));
      overflow-y: auto;
      overscroll-behavior: contain;
    }
    .pickup-select__list::-webkit-scrollbar { width: 6px; }
    .pickup-select__list::-webkit-scrollbar-thumb {
      background: rgba(255, 106, 26, 0.35);
      border-radius: 999px;
    }
    .pickup-select__option {
      min-height: var(--slot-h);
      display: flex;
      align-items: center;
      padding: 0 10px;
      border-radius: 6px;
      font-size: 0.9rem;
      color: var(--text);
      cursor: pointer;
      user-select: none;
    }
    .pickup-select__option:hover,
    .pickup-select__option:focus-visible {
      background: var(--item-hover);
      outline: none;
    }
    .pickup-select__option.is-selected {
      color: var(--orange);
      font-weight: 600;
      background: var(--item-hover);
    }
    .pickup-select.is-disabled .pickup-select__trigger {
      opacity: 0.55;
      cursor: not-allowed;
    }

    @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }
    @media (max-width: 520px) { .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back-to-menu" href="./">&lt; назад в меню</a>
    <h1>Оформление заказа</h1>
    <p id="apiStatus" class="muted" style="margin:0 0 8px;font-size:0.85rem;" hidden></p>
    <div class="grid">
      <section class="card">
        <div class="cart-card-head">
          <h3>Ваш заказ</h3>
          <button type="button" class="btn-clear-cart" id="clearCartBtn" disabled>Очистить</button>
        </div>
        <div class="items" id="checkoutItems"></div>
        <div class="total" id="checkoutTotal">0 ₽</div>
        <section class="recommendations" id="checkoutRecommendations" aria-live="polite">
          <h4>Рекомендации к заказу</h4>
          <p class="recommendations-empty">Добавьте блюда в корзину, и здесь появятся рекомендации.</p>
        </section>
      </section>

      <section class="card">
        <h3>Контакты</h3>
        <form id="checkoutForm" novalidate>
          <input type="hidden" name="deliveryType" value="pickup">
          <input type="hidden" name="pickupLocation" value="eat-arena">

          <p class="pickup-point muted"><strong>Eat Arena</strong> · самовывоз, 2 этаж</p>

          <div class="row">
            <div class="field">
              <label for="name">Имя *</label>
              <input id="name" type="text" placeholder="Имя" required>
            </div>
            <div class="field">
              <label for="phone">Телефон *</label>
              <input id="phone" type="tel" placeholder="+7 999 000 00 00" required>
            </div>
          </div>

          <div class="field">
            <label for="email">e-mail/TG</label>
            <input id="email" type="text" placeholder="@username или name@example.com">
          </div>

          <div class="field">
            <label>Оплата</label>
            <div class="inline-choices">
              <label><input type="radio" name="paymentMethod" value="transfer" checked> Перевод</label>
              <label><input type="radio" name="paymentMethod" value="counter"> На кассе</label>
            </div>
          </div>

          <div class="field">
            <label id="pickupTimeLabel">Когда забрать *</label>
            <div class="pickup-select" id="pickupTimePicker">
              <button type="button" class="pickup-select__trigger" id="pickupTimeTrigger" aria-haspopup="listbox" aria-expanded="false" aria-labelledby="pickupTimeLabel">
                <span id="pickupTimeValue">Как можно скорее</span>
                <span class="pickup-select__chevron" aria-hidden="true">▼</span>
              </button>
              <div class="pickup-select__panel" id="pickupTimePanel">
                <ul class="pickup-select__list" id="pickupTimeList" role="listbox" tabindex="-1"></ul>
              </div>
              <input type="hidden" id="pickupTime" name="pickupTime" value="asap">
            </div>
          </div>

          <div class="field">
            <label for="comment">Комментарий</label>
            <textarea id="comment" rows="2" placeholder="Пожелания (необязательно)"></textarea>
          </div>

          <p class="error" id="formError"></p>
          <div class="actions">
            <button type="submit" id="submitBtn">Отправить заказ</button>
          </div>
        </form>
      </section>
    </div>
  </div>

  <script>
    const EMIKA_API_FALLBACK = 'https://chickenjokey.onrender.com';
    let emikaApiOrigin = location.origin;

    async function emikaPingApi(base) {
      try {
        const res = await fetch(new URL('/api/health', base).href, { cache: 'no-store' });
        if (!res.ok) return false;
        const data = await res.json();
        return Boolean(data?.ok);
      } catch {
        return false;
      }
    }

    async function emikaResolveApiOrigin() {
      const host = location.hostname;
      if (host === 'localhost' || host === '127.0.0.1') return location.origin;
      if (await emikaPingApi(location.origin)) return location.origin;
      if (await emikaPingApi(EMIKA_API_FALLBACK)) return EMIKA_API_FALLBACK;
      return EMIKA_API_FALLBACK;
    }

    const emikaApiReady = emikaResolveApiOrigin().then((origin) => {
      emikaApiOrigin = origin;
      return origin;
    });

    function emikaApiUrl(path) {
      return new URL(path, emikaApiOrigin).href;
    }

    window.emikaApiReady = emikaApiReady;
    window.emikaApiUrl = emikaApiUrl;

    const MSK_TZ = 'Europe/Moscow';
    const MSK_OPEN_MIN = 11 * 60;
    const MSK_CLOSE_MIN = 22 * 60;
    const MSK_STEP_MIN = 15;
    const MSK_BUFFER_MIN = 30;

    const CART_STORAGE_KEY = 'emika-cart';
    const CHECKOUT_CART_KEY = 'emika-checkout-cart';
    const CART_TTL_MS = 7 * 24 * 60 * 60 * 1000;

    const itemsWrap = document.getElementById('checkoutItems');
    const totalEl = document.getElementById('checkoutTotal');
    const recommendationsEl = document.getElementById('checkoutRecommendations');
    const form = document.getElementById('checkoutForm');
    const err = document.getElementById('formError');
    const submitBtn = document.getElementById('submitBtn');
    const clearCartBtn = document.getElementById('clearCartBtn');

    const pickupPicker = document.getElementById('pickupTimePicker');
    const pickupTrigger = document.getElementById('pickupTimeTrigger');
    const pickupPanel = document.getElementById('pickupTimePanel');
    const pickupList = document.getElementById('pickupTimeList');
    const pickupValueEl = document.getElementById('pickupTimeValue');
    const pickupHidden = document.getElementById('pickupTime');

    const prefContactRaw = localStorage.getItem('emika-checkout-contact');
    const metaRaw = localStorage.getItem('emika-checkout-meta');

    if (prefContactRaw) {
      try {
        const pref = JSON.parse(prefContactRaw);
        if (pref?.name) document.getElementById('name').value = pref.name;
        if (pref?.phone) document.getElementById('phone').value = pref.phone;
        if (pref?.email) document.getElementById('email').value = pref.email;
      } catch (e) {}
    }

    let meta = {};
    if (metaRaw) {
      try { meta = JSON.parse(metaRaw) || {}; } catch (e) {}
    }

    function getMoscowMinutes() {
      const parts = new Intl.DateTimeFormat('en-GB', {
        timeZone: MSK_TZ,
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      }).formatToParts(new Date());
      const hour = Number(parts.find((p) => p.type === 'hour')?.value || 0);
      const minute = Number(parts.find((p) => p.type === 'minute')?.value || 0);
      return hour * 60 + minute;
    }

    function formatTime(totalMinutes) {
      const h = Math.floor(totalMinutes / 60);
      const m = totalMinutes % 60;
      return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    }

    function roundUpToStep(minutes) {
      return Math.ceil(minutes / MSK_STEP_MIN) * MSK_STEP_MIN;
    }

    function buildPickupTimeOptions() {
      const earliest = roundUpToStep(getMoscowMinutes() + MSK_BUFFER_MIN);
      const start = Math.max(earliest, MSK_OPEN_MIN);
      const options = [{ value: 'asap', label: 'Как можно скорее' }];

      for (let t = start; t <= MSK_CLOSE_MIN; t += MSK_STEP_MIN) {
        options.push({ value: formatTime(t), label: formatTime(t) });
      }

      return options;
    }

    let pickupOptions = [];

    function setPickupSelection(value, label) {
      pickupHidden.value = value;
      pickupValueEl.textContent = label;
      pickupList.querySelectorAll('.pickup-select__option').forEach((el) => {
        el.classList.toggle('is-selected', el.dataset.value === value);
      });
    }

    function closePickupPanel() {
      pickupPicker.classList.remove('is-open');
      pickupTrigger.setAttribute('aria-expanded', 'false');
    }

    function openPickupPanel() {
      if (pickupPicker.classList.contains('is-disabled')) return;
      pickupPicker.classList.add('is-open');
      pickupTrigger.setAttribute('aria-expanded', 'true');
      const selected = pickupList.querySelector('.pickup-select__option.is-selected');
      if (selected) {
        selected.scrollIntoView({ block: 'nearest' });
      }
    }

    function fillPickupTimePicker() {
      pickupOptions = buildPickupTimeOptions();
      pickupList.innerHTML = '';

      if (pickupOptions.length === 1) {
        pickupPicker.classList.add('is-disabled');
        setPickupSelection('', 'Сегодня приём заказов закончен');
        submitBtn.disabled = true;
        return;
      }

      pickupPicker.classList.remove('is-disabled');
      pickupOptions.forEach((item, index) => {
        const li = document.createElement('li');
        li.className = 'pickup-select__option';
        li.dataset.value = item.value;
        li.textContent = item.label;
        li.setAttribute('role', 'option');
        li.tabIndex = 0;
        if (index === 0) li.classList.add('is-selected');
        li.addEventListener('click', () => {
          setPickupSelection(item.value, item.label);
          closePickupPanel();
        });
        pickupList.appendChild(li);
      });

      setPickupSelection(pickupOptions[0].value, pickupOptions[0].label);
    }

    pickupTrigger.addEventListener('click', () => {
      if (pickupPicker.classList.contains('is-open')) {
        closePickupPanel();
      } else {
        openPickupPanel();
      }
    });

    document.addEventListener('click', (e) => {
      if (!pickupPicker.contains(e.target)) closePickupPanel();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closePickupPanel();
    });

    fillPickupTimePicker();

    function normalizeCartItem(item) {
      return {
        id: String(item?.id || ''),
        titleRu: item?.titleRu || '',
        titleEn: item?.titleEn || '',
        price: Number(item?.price) || 0,
        qty: Math.max(1, Math.min(99, Number(item?.qty) || 1)),
        image: item?.image || '/images/logo.png'
      };
    }

    function loadCheckoutCart() {
      try {
        const checkoutCart = JSON.parse(localStorage.getItem(CHECKOUT_CART_KEY) || '[]');
        if (Array.isArray(checkoutCart) && checkoutCart.length) {
          return checkoutCart.map(normalizeCartItem);
        }
      } catch (_) {}

      try {
        const raw = localStorage.getItem(CART_STORAGE_KEY);
        const data = JSON.parse(raw || '{}');
        const items = Array.isArray(data?.items) ? data.items : [];
        const savedAt = Number(data?.savedAt || 0);
        if (!items.length) return [];
        if (savedAt && Date.now() - savedAt > CART_TTL_MS) return [];
        return items.map(normalizeCartItem);
      } catch (_) {
        return [];
      }
    }

    let cart = loadCheckoutCart();

    function getCartTotal() {
      return cart.reduce((sum, item) => sum + item.price * item.qty, 0);
    }

    function normalizeText(value) {
      return String(value || '').toLowerCase().replace(/\s+/g, ' ').trim();
    }

    function itemTags(item) {
      const id = normalizeText(item.id);
      const ru = normalizeText(item.titleRu);
      const en = normalizeText(item.titleEn);
      const text = `${id} ${ru} ${en}`;
      return {
        isMilkshake: /milkshake|милкшейк|drink-choco|drink-straw|drink-van/.test(text),
        isColeslaw: /coleslaw|коул слоу/.test(text),
        isMac: /mac|мак.?н.?чиз/.test(text),
        isFries: /fries|картошка фри/.test(text),
        isBowl: /bowl|боул/.test(text),
        isEmikaSauce: /emika|эмика/.test(text) && /sauce|соус/.test(text),
        needsSauce: /combo1|combo2|combo3|combo4|combo5|bites|tenders|fries|cheese-medallions|стрипс|байтс|байтсы|медальон/.test(text)
      };
    }

    const RECOMMENDED_PRODUCTS = {
      'drink-choco': { id: 'drink-choco', titleRu: 'Милкшейк — Шоколад', titleEn: 'Chocolate milkshake', price: 290, image: '/images/drink3.png' },
      'drink-straw': { id: 'drink-straw', titleRu: 'Милкшейк — Клубника', titleEn: 'Strawberry milkshake', price: 290, image: '/images/drink4.png' },
      'drink-van': { id: 'drink-van', titleRu: 'Милкшейк — Ваниль', titleEn: 'Vanilla milkshake', price: 290, image: '/images/drink5.png' },
      coleslaw: { id: 'coleslaw', titleRu: 'Салат Коул Слоу', titleEn: 'Coleslaw', price: 229, image: '/images/sal2.png' },
      mac: { id: 'mac', titleRu: "Мак'н'Чиз", titleEn: 'Mac & cheese', price: 249, image: '/images/sal4.png' },
      fries: { id: 'fries', titleRu: 'Картошка фри', titleEn: 'Fries', price: 229, image: '/images/burg2.png' },
      sauce: { id: 'sauce', titleRu: "Соус Emika's", titleEn: "Emika's sauce", price: 199, image: '/images/sal1.png' },
      bowl1: { id: 'bowl1', titleRu: "Emika's Боул", titleEn: "Emika's Bowl", price: 799, image: '/images/bowl1.png' },
      bowl2: { id: 'bowl2', titleRu: "Мак'н'Чиз Боул", titleEn: 'Mac & Cheese Bowl', price: 799, image: '/images/bowl2.png' }
    };

    let recentlyAddedProductId = '';

    function hasProductInCart(productId) {
      const pid = normalizeText(productId);
      return cart.some((item) => normalizeText(item.id).includes(pid));
    }

    function getRecommendedProductIds() {
      const recs = [];
      const seen = new Set();
      const total = getCartTotal();
      const state = {
        hasMilkshake: false,
        hasColeslaw: false,
        hasMac: false,
        hasFries: false,
        hasBowl: false,
        hasEmikaSauce: false,
        hasSauceRequiredItem: false,
        hasItemOver1000: false,
        hasItemUnder500: false
      };

      cart.forEach((item) => {
        const tags = itemTags(item);
        if (tags.isMilkshake) state.hasMilkshake = true;
        if (tags.isColeslaw) state.hasColeslaw = true;
        if (tags.isMac) state.hasMac = true;
        if (tags.isFries) state.hasFries = true;
        if (tags.isBowl) state.hasBowl = true;
        if (tags.isEmikaSauce) state.hasEmikaSauce = true;
        if (tags.needsSauce) state.hasSauceRequiredItem = true;
        if (item.price > 1000) state.hasItemOver1000 = true;
        if (item.price < 500) state.hasItemUnder500 = true;
      });

      const addRec = (id) => {
        if (!RECOMMENDED_PRODUCTS[id] || seen.has(id) || hasProductInCart(id)) return;
        seen.add(id);
        recs.push(id);
      };

      if (state.hasItemOver1000 && !state.hasMilkshake) {
        addRec('drink-choco');
        addRec('drink-straw');
        addRec('drink-van');
      }

      if (state.hasItemUnder500) {
        if (!state.hasColeslaw) addRec('coleslaw');
        if (!state.hasMac) addRec('mac');
        if (!state.hasFries) addRec('fries');
      }

      if (state.hasSauceRequiredItem && !state.hasEmikaSauce) {
        addRec('sauce');
      }

      if (total >= 1500) {
        if (!state.hasBowl) {
          addRec('bowl1');
          addRec('bowl2');
        }
        if (!state.hasMac) addRec('mac');
      }

      return recs;
    }

    function animateFlyToCart(fromEl) {
      if (!fromEl || !totalEl) return;
      const source = fromEl.closest('.recommendation-card')?.querySelector('img');
      if (!source) return;
      const srcRect = source.getBoundingClientRect();
      const dstRect = totalEl.getBoundingClientRect();
      const chip = document.createElement('span');
      chip.className = 'fly-chip';
      chip.style.left = `${srcRect.left + srcRect.width / 2 - 17}px`;
      chip.style.top = `${srcRect.top + srcRect.height / 2 - 17}px`;
      chip.style.backgroundImage = `url("${source.getAttribute('src')}")`;
      document.body.appendChild(chip);
      requestAnimationFrame(() => {
        chip.style.transition = 'transform 380ms ease, opacity 380ms ease';
        chip.style.transform = `translate(${dstRect.left - srcRect.left}px, ${dstRect.top - srcRect.top}px) scale(0.45)`;
        chip.style.opacity = '0.2';
      });
      setTimeout(() => chip.remove(), 420);
    }

    function addRecommendedProduct(productId, triggerEl) {
      const product = RECOMMENDED_PRODUCTS[productId];
      if (!product) return;
      const existingIndex = cart.findIndex((item) => normalizeText(item.id) === normalizeText(product.id));
      if (existingIndex >= 0) {
        cart[existingIndex].qty = Math.min(99, cart[existingIndex].qty + 1);
      } else {
        cart.push({
          id: product.id,
          titleRu: product.titleRu,
          titleEn: product.titleEn,
          price: product.price,
          qty: 1,
          image: product.image
        });
      }
      recentlyAddedProductId = product.id;
      if (triggerEl) {
        triggerEl.classList.add('is-added');
        setTimeout(() => triggerEl.classList.remove('is-added'), 240);
      }
      animateFlyToCart(triggerEl);
      saveCart();
      renderCart();
    }

    function renderRecommendations() {
      if (!recommendationsEl) return;
      const recs = getRecommendedProductIds();
      if (!cart.length) {
        recommendationsEl.innerHTML = `
          <h4>Рекомендации к заказу</h4>
          <p class="recommendations-empty">Добавьте блюда в корзину, и здесь появятся рекомендации.</p>
        `;
        return;
      }
      if (!recs.length) {
        recommendationsEl.innerHTML = `
          <h4>Рекомендации к заказу</h4>
          <p class="recommendations-empty">Состав заказа выглядит сбалансированно.</p>
        `;
        return;
      }
      recommendationsEl.innerHTML = `
        <h4>Рекомендации к заказу</h4>
        <p class="recommendations-hint">Добавьте в заказ в один тап:</p>
        <div class="recommendations-line">
          ${recs.map((id) => {
            const p = RECOMMENDED_PRODUCTS[id];
            return `
              <article class="recommendation-card">
                <img src="${p.image}" alt="">
                <div class="recommendation-title">${p.titleRu}</div>
                <div class="recommendation-row">
                  <span class="recommendation-price">${p.price} ₽</span>
                  <button type="button" class="recommendation-add" data-action="add-reco" data-product="${p.id}">Добавить</button>
                </div>
              </article>
            `;
          }).join('')}
        </div>
      `;
    }

    function saveCart() {
      localStorage.setItem(CHECKOUT_CART_KEY, JSON.stringify(cart));
      if (cart.length) {
        localStorage.setItem(CART_STORAGE_KEY, JSON.stringify({
          savedAt: Date.now(),
          items: cart.map((item) => ({
            id: item.id,
            titleRu: item.titleRu,
            titleEn: item.titleEn,
            price: item.price,
            qty: item.qty,
            image: item.image
          }))
        }));
      } else {
        localStorage.removeItem(CART_STORAGE_KEY);
        localStorage.removeItem(CHECKOUT_CART_KEY);
      }
    }

    function setItemQty(index, nextQty) {
      const item = cart[index];
      if (!item) return;
      const n = Math.floor(Number(nextQty));
      if (!Number.isFinite(n) || n < 1) {
        removeItem(index);
        return;
      }
      item.qty = Math.min(99, n);
      saveCart();
      renderCart();
    }

    function removeItem(index) {
      cart.splice(index, 1);
      saveCart();
      renderCart();
    }

    function clearCart() {
      if (!cart.length) return;
      if (!confirm('Очистить корзину?')) return;
      cart = [];
      saveCart();
      renderCart();
    }

    function renderCart() {
      itemsWrap.innerHTML = '';
      const total = getCartTotal();
      totalEl.textContent = `${total} ₽`;
      clearCartBtn.disabled = !cart.length;

      if (!cart.length) {
        itemsWrap.innerHTML = '<p class="muted">Корзина пуста. <a href="./" style="color:var(--orange)">Вернитесь в меню</a>.</p>';
        submitBtn.disabled = true;
        renderRecommendations();
        return;
      }

      submitBtn.disabled = false;
      cart.forEach((item, index) => {
        const sum = item.price * item.qty;
        const el = document.createElement('div');
        el.className = 'item';
        if (normalizeText(item.id) === normalizeText(recentlyAddedProductId)) {
          el.classList.add('cart-flash');
        }
        el.dataset.index = String(index);
        el.innerHTML = `
          <img src="${item.image}" alt="">
          <div class="item-main">
            <div>${item.titleRu || item.titleEn}</div>
            <div class="muted">${item.price} ₽ × ${item.qty} = ${sum} ₽</div>
          </div>
          <div class="item-actions">
            <div class="qty">
              <button type="button" data-action="minus" aria-label="Меньше">−</button>
              <input type="number" class="qty-input" data-action="qty" min="1" max="99" step="1" value="${item.qty}" inputmode="numeric" aria-label="Количество">
              <button type="button" data-action="plus" aria-label="Больше">+</button>
            </div>
            <button type="button" class="item-remove" data-action="remove" aria-label="Удалить" title="Удалить">×</button>
          </div>
        `;
        itemsWrap.appendChild(el);
      });
      recentlyAddedProductId = '';
      renderRecommendations();
    }

    itemsWrap.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-action]');
      if (!btn) return;
      const row = e.target.closest('.item');
      if (!row) return;
      const index = Number(row.dataset.index);
      const item = cart[index];
      if (!item) return;
      const action = btn.dataset.action;

      if (action === 'plus') {
        setItemQty(index, item.qty + 1);
        return;
      }
      if (action === 'minus') {
        if (item.qty > 1) setItemQty(index, item.qty - 1);
        else removeItem(index);
        return;
      }
      if (action === 'remove') {
        removeItem(index);
      }
    });

    itemsWrap.addEventListener('change', (e) => {
      const input = e.target.closest('.qty-input');
      if (!input) return;
      const row = input.closest('.item');
      if (!row) return;
      setItemQty(Number(row.dataset.index), input.value);
    });

    itemsWrap.addEventListener('keydown', (e) => {
      if (e.target.matches('.qty-input') && e.key === 'Enter') {
        e.target.blur();
      }
    });
    recommendationsEl?.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-action="add-reco"]');
      if (!btn) return;
      addRecommendedProduct(btn.dataset.product, btn);
    });

    clearCartBtn.addEventListener('click', clearCart);

    renderCart();

    const PICKUP_ADDRESS = 'Eat Arena, Мичуринский пр., 13А, стр. 1 — самовывоз';

    function orderServerErrorMessage() {
      return 'Не удалось отправить заказ. Обновите страницу или позвоните +7 977 838 98 98.';
    }

    async function parseJsonResponse(res) {
      const text = await res.text();
      try {
        return JSON.parse(text);
      } catch {
        throw new Error(orderServerErrorMessage());
      }
    }

    async function checkApi() {
      try {
        await emikaApiReady;
        const res = await fetch(emikaApiUrl('/api/health'), { cache: 'no-store' });
        if (!res.ok) return false;
        const data = await res.json();
        return Boolean(data?.ok);
      } catch {
        return false;
      }
    }

    function readPickupTime() {
      const value = pickupHidden.value;
      if (!value) return { mode: '', at: '' };
      if (value === 'asap') return { mode: 'asap', at: '' };
      return { mode: 'at', at: value };
    }

    try {
      sessionStorage.removeItem('emika-api-base');
    } catch (_) {}

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.style.display = 'none';

      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();
      const deliveryType = 'pickup';

      if (!name || !phone) {
        err.textContent = 'Укажите имя и телефон.';
        err.style.display = 'block';
        return;
      }
      if (!cart.length) return;

      const { mode: pickupTimeMode, at: pickupTimeAt } = readPickupTime();
      if (!pickupTimeMode) {
        err.textContent = 'Сегодня приём заказов закончен. Позвоните +7 977 838 98 98.';
        err.style.display = 'block';
        return;
      }

      const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked')?.value || 'counter';

      submitBtn.disabled = true;
      submitBtn.textContent = 'Отправляем…';

      const payload = {
        customer: { name, phone, email },
        deliveryType,
        location: 'eat-arena',
        address: PICKUP_ADDRESS,
        addressExtra: '',
        comment: document.getElementById('comment').value.trim(),
        paymentMethod,
        pickupTimeMode,
        pickupTimeAt,
        promoCode: meta.promoCode || '',
        items: cart,
        total: getCartTotal()
      };

      try {
        await emikaApiReady;
        if (!(await checkApi())) {
          throw new Error(orderServerErrorMessage());
        }

        const res = await fetch(emikaApiUrl('/api/orders'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await parseJsonResponse(res);
        if (!res.ok) throw new Error(data.error || 'Ошибка сервера');

        localStorage.setItem('emika-checkout-contact', JSON.stringify({ name, phone, email }));
        localStorage.removeItem('emika-checkout-cart');
        localStorage.removeItem('emika-checkout-meta');
        localStorage.removeItem('emika-cart');
        localStorage.setItem('emika-last-order', JSON.stringify({
          orderNumber: data.orderNumber,
          id: data.id,
          total: getCartTotal(),
          paymentMethod,
          pickupTimeMode,
          pickupTimeAt
        }));

        window.location.href = `order-success.html?order=${encodeURIComponent(data.orderNumber)}`;
      } catch (error) {
        err.textContent = error.message || orderServerErrorMessage();
        err.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Отправить заказ';
      }
    });
  </script>
</body>
</html>
