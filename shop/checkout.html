<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оформление заказа — Emika's</title>
  <link rel="shortcut icon" href="../images/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="emika-guard.js"></script>
  <style>
    :root { --orange:#ff6a1a; --bg:#0d0d0f; --card:rgba(20,20,24,.92); --text:#f5f5f5; --muted:#c9c9ce; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-family:'Montserrat', sans-serif; }
    .wrap { max-width:980px; margin:0 auto; padding:22px 14px 40px; }
    h1 { margin:0 0 14px; font-size:1.5rem; }
    .grid { display:grid; grid-template-columns:1.2fr .8fr; gap:14px; }
    .card { background:var(--card); border:1px solid rgba(255,255,255,.08); border-radius:14px; padding:14px; }
    .items { display:grid; gap:10px; }
    .item { display:grid; grid-template-columns:64px 1fr auto; gap:10px; align-items:center; border:1px solid rgba(255,255,255,.08); border-radius:10px; padding:8px; }
    .item img { width:64px; height:64px; object-fit:contain; border-radius:8px; background:rgba(255,255,255,.04); }
    .muted { color:var(--muted); font-size:.9rem; }
    .total { font-size:1.2rem; font-weight:700; color:var(--orange); margin-top:10px; }
    label { display:block; font-size:.88rem; margin:10px 0 6px; color:var(--muted); font-weight:600; }
    input, textarea, select { width:100%; border-radius:10px; border:1px solid rgba(255,255,255,.16); background:rgba(255,255,255,.05); color:var(--text); padding:10px; font-family:inherit; }
    textarea { min-height:80px; resize:vertical; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .type-row { display:flex; gap:8px; flex-wrap:wrap; margin:4px 0 10px; }
    .type-row label {
      display:inline-flex; align-items:center; gap:6px; margin:0;
      font-weight:600; color:var(--text); cursor:pointer;
      padding:8px 12px; border-radius:999px;
      border:1px solid rgba(255,255,255,.14); background:rgba(255,255,255,.04);
      font-size:0.85rem;
    }
    .type-row label:has(input:checked) {
      border-color:rgba(255,106,26,.55); background:rgba(255,106,26,.12);
    }
    .type-row input { width:auto; }
    #pickupTimeAt { margin-top:4px; max-width:160px; }
    #pickupTimeAt[hidden] { display:none !important; }
    .actions { display:flex; gap:10px; margin-top:12px; }
    button, a.btn { padding:12px 16px; border-radius:999px; border:none; background:var(--orange); color:#fff; font-weight:700; cursor:pointer; text-decoration:none; font-family:inherit; }
    button:disabled { opacity:.6; cursor:not-allowed; }
    .back-to-menu { display:inline-block; margin-bottom:16px; color:var(--orange); font-weight:700; text-decoration:none; font-size:.95rem; }
    .error { color:#ff8080; font-size:.88rem; display:none; margin-top:8px; }
    #addressBlock[hidden], #deliveryTypeRow[hidden] { display:none !important; }
    .pickup-point { margin:0 0 12px; padding:10px 12px; border-radius:10px; background:rgba(255,106,26,.08); border:1px solid rgba(255,106,26,.25); }
    .pickup-point strong { color:var(--orange); }
    @media (max-width:860px) { .grid { grid-template-columns:1fr; } }
    @media (max-width:520px) { .row { grid-template-columns:1fr; } .actions { flex-direction:column; } .actions button { width:100%; } }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back-to-menu" href="./">&lt; назад в меню</a>
    <h1>Оформление заказа</h1>
    <p id="apiStatus" class="muted" style="margin:0 0 12px;font-size:0.88rem;"></p>
    <div class="grid">
      <section class="card">
        <h3>Ваш заказ</h3>
        <div class="items" id="checkoutItems"></div>
        <div class="total" id="checkoutTotal">0 ₽</div>
      </section>

      <section class="card">
        <h3>Контакты</h3>
        <form id="checkoutForm" novalidate>
          <input type="hidden" name="deliveryType" value="pickup">
          <input type="hidden" name="pickupLocation" value="eat-arena">

          <p class="pickup-point muted"><strong>Eat Arena</strong> · самовывоз, 2 этаж</p>

          <div id="deliveryTypeRow" hidden>
            <label>Способ получения</label>
            <div class="type-row">
              <label><input type="radio" name="deliveryTypeVisible" value="delivery"> Доставка</label>
              <label><input type="radio" name="deliveryTypeVisible" value="pickup" checked> Самовывоз</label>
            </div>
          </div>

          <div id="addressBlock" hidden>
            <label for="address">Адрес доставки *</label>
            <input id="address" type="text" placeholder="Улица, дом, квартира">

            <label for="addressExtra">Подъезд, этаж, домофон</label>
            <input id="addressExtra" type="text" placeholder="Необязательно">
          </div>

          <div class="row">
            <div>
              <label for="name">Имя *</label>
              <input id="name" type="text" placeholder="Имя" required>
            </div>
            <div>
              <label for="phone">Телефон *</label>
              <input id="phone" type="tel" placeholder="+7 999 000 00 00" required>
            </div>
          </div>

          <label>Оплата</label>
          <div class="type-row">
            <label><input type="radio" name="paymentMethod" value="transfer" checked> Перевод</label>
            <label><input type="radio" name="paymentMethod" value="counter"> На кассе</label>
          </div>

          <label>Когда забрать</label>
          <div class="type-row">
            <label><input type="radio" name="pickupTime" value="asap" checked> Быстрее</label>
            <label><input type="radio" name="pickupTime" value="hour"> В течение часа</label>
            <label><input type="radio" name="pickupTime" value="at"> Ко времени</label>
          </div>
          <input type="time" id="pickupTimeAt" hidden>

          <label for="comment">Комментарий</label>
          <textarea id="comment" rows="2" placeholder="Пожелания (необязательно)"></textarea>

          <p class="error" id="formError"></p>
          <div class="actions">
            <button type="submit" id="submitBtn">Отправить заказ</button>
          </div>
        </form>
      </section>
    </div>
  </div>

  <script>
    const itemsWrap = document.getElementById('checkoutItems');
    const totalEl = document.getElementById('checkoutTotal');
    const form = document.getElementById('checkoutForm');
    const err = document.getElementById('formError');
    const submitBtn = document.getElementById('submitBtn');
    const addressBlock = document.getElementById('addressBlock');

    const prefContactRaw = localStorage.getItem('emika-checkout-contact');
    const metaRaw = localStorage.getItem('emika-checkout-meta');

    if (prefContactRaw) {
      try {
        const pref = JSON.parse(prefContactRaw);
        if (pref?.name) document.getElementById('name').value = pref.name;
        if (pref?.phone) document.getElementById('phone').value = pref.phone;
      } catch (e) {}
    }

    let meta = {};
    if (metaRaw) {
      try { meta = JSON.parse(metaRaw) || {}; } catch (e) {}
    }

    function loadCheckoutCart() {
      try {
        const checkoutCart = JSON.parse(localStorage.getItem('emika-checkout-cart') || '[]');
        if (Array.isArray(checkoutCart) && checkoutCart.length) return checkoutCart;
      } catch (_) {}

      try {
        const raw = localStorage.getItem('emika-cart');
        const data = JSON.parse(raw || '{}');
        const items = Array.isArray(data?.items) ? data.items : [];
        const savedAt = Number(data?.savedAt || 0);
        const CART_TTL_MS = 7 * 24 * 60 * 60 * 1000;
        if (!items.length) return [];
        if (savedAt && Date.now() - savedAt > CART_TTL_MS) return [];
        return items.map((item) => ({
          id: item.id,
          titleRu: item.titleRu,
          titleEn: item.titleEn,
          price: Number(item.price) || 0,
          qty: Number(item.qty) || 1,
          image: item.image || '../images/logo.png'
        }));
      } catch (_) {
        return [];
      }
    }

    const cart = loadCheckoutCart();
    let total = 0;

    if (!cart.length) {
      itemsWrap.innerHTML = '<p class="muted">Корзина пуста. <a href="./" style="color:var(--orange)">Вернитесь в меню</a>.</p>';
      submitBtn.disabled = true;
    } else {
      cart.forEach((item) => {
        const sum = item.price * item.qty;
        total += sum;
        const el = document.createElement('div');
        el.className = 'item';
        el.innerHTML = `
          <img src="${item.image}" alt="">
          <div>
            <div>${item.titleRu || item.titleEn}</div>
            <div class="muted">${item.qty} × ${item.price} ₽</div>
          </div>
          <strong>${sum} ₽</strong>
        `;
        itemsWrap.appendChild(el);
      });
    }
    totalEl.textContent = `${total} ₽`;

    const PICKUP_ADDRESS = 'Eat Arena, Мичуринский пр., 13А, стр. 1 — самовывоз';

    const DEV_PORTS = new Set(['5500', '5501', '8080', '5173', '4173', '8888']);
    const LOCAL_API_ORIGINS = ['http://127.0.0.1:3000', 'http://localhost:3000'];

    function isLocalHostname() {
      return location.hostname === 'localhost' || location.hostname === '127.0.0.1';
    }

    function isLocalDevContext() {
      return (
        location.protocol === 'file:' ||
        DEV_PORTS.has(location.port) ||
        isLocalHostname()
      );
    }

    function isOnlineSite() {
      return location.protocol.startsWith('http') && !isLocalHostname();
    }

    function clearStaleApiBaseCache() {
      const cached = sessionStorage.getItem('emika-api-base');
      if (!cached) return;
      if (isOnlineSite() && (cached.includes('localhost') || cached.includes('127.0.0.1'))) {
        sessionStorage.removeItem('emika-api-base');
      }
    }

    async function pingApi(base) {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 4000);
      try {
        const res = await fetch(`${base}/api/health`, { signal: ctrl.signal });
        clearTimeout(timer);
        if (!res.ok) return false;
        const ct = (res.headers.get('content-type') || '').toLowerCase();
        if (!ct.includes('json')) return false;
        const data = await res.json();
        return Boolean(data?.ok);
      } catch {
        clearTimeout(timer);
        return false;
      }
    }

    async function redirectToShopServerIfNeeded() {
      // Редирект на localhost только при открытии файла с диска (разработка)
      if (location.protocol !== 'file:') return false;

      for (const origin of LOCAL_API_ORIGINS) {
        if (!(await pingApi(origin))) continue;
        const path = location.protocol === 'file:'
          ? '/checkout.html'
          : (location.pathname.match(/checkout\.html$/) ? '/checkout.html' : '/');
        window.location.replace(`${origin}${path}${location.search}${location.hash}`);
        return true;
      }
      return false;
    }

    function orderServerErrorMessage() {
      if (isOnlineSite()) {
        return 'Не удалось связаться с сервером. Обновите страницу или позвоните +7 977 838 98 98.';
      }
      return 'Сервер заказов не отвечает. Для разработки запустите start-shop.bat (папка shop).';
    }

    async function parseJsonResponse(res) {
      const text = await res.text();
      try {
        return JSON.parse(text);
      } catch {
        throw new Error(orderServerErrorMessage());
      }
    }

    const apiStatusEl = document.getElementById('apiStatus');

    async function resolveApiBase(force) {
      clearStaleApiBaseCache();

      if (isOnlineSite()) {
        if (!force) {
          const cached = sessionStorage.getItem('emika-api-base');
          if (cached === '' && (await pingApi(''))) return '';
        }
        if (await pingApi('')) {
          sessionStorage.setItem('emika-api-base', '');
          return '';
        }
        sessionStorage.removeItem('emika-api-base');
        return null;
      }

      if (!force) {
        const cached = sessionStorage.getItem('emika-api-base');
        if (cached !== null && (await pingApi(cached))) return cached;
      }

      const candidates = ['', ...LOCAL_API_ORIGINS];
      for (const base of candidates) {
        if (!(await pingApi(base))) continue;
        sessionStorage.setItem('emika-api-base', base);
        return base;
      }
      sessionStorage.removeItem('emika-api-base');
      return null;
    }

    async function refreshApiStatus() {
      if (!apiStatusEl) return (await resolveApiBase(true)) !== null;

      if (isOnlineSite()) {
        apiStatusEl.hidden = true;
        return (await resolveApiBase(true)) !== null;
      }

      apiStatusEl.hidden = false;
      apiStatusEl.textContent = 'Проверяем сервер заказов…';
      const base = await resolveApiBase(true);
      if (base !== null) {
        apiStatusEl.innerHTML = 'Сервер заказов: <strong style="color:#3ecf8e">подключён</strong>';
        return true;
      }
      apiStatusEl.innerHTML =
        'Сервер заказов: <strong style="color:#ff8080">не найден</strong>. ' +
        'Для локальной разработки запустите <code>start-shop.bat</code>.';
      return false;
    }

    const pickupTimeAtInput = document.getElementById('pickupTimeAt');

    function syncPickupTimeField() {
      const mode = document.querySelector('input[name="pickupTime"]:checked')?.value || 'asap';
      pickupTimeAtInput.hidden = mode !== 'at';
      pickupTimeAtInput.required = mode === 'at';
    }

    document.querySelectorAll('input[name="pickupTime"]').forEach((el) => {
      el.addEventListener('change', syncPickupTimeField);
    });
    syncPickupTimeField();

    (async () => {
      if (await redirectToShopServerIfNeeded()) return;
      refreshApiStatus();
    })();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.style.display = 'none';

      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const deliveryType = 'pickup';
      const address = '';

      if (!name || !phone) {
        err.textContent = 'Укажите имя и телефон.';
        err.style.display = 'block';
        return;
      }
      if (!cart.length) return;

      const pickupTimeMode = document.querySelector('input[name="pickupTime"]:checked')?.value || 'asap';
      const pickupTimeAt = pickupTimeAtInput.value.trim();
      if (pickupTimeMode === 'at' && !pickupTimeAt) {
        err.textContent = 'Укажите время самовывоза.';
        err.style.display = 'block';
        return;
      }

      const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked')?.value || 'counter';

      submitBtn.disabled = true;
      submitBtn.textContent = 'Отправляем…';

      const payload = {
        customer: { name, phone, email: '' },
        deliveryType,
        location: 'eat-arena',
        address: PICKUP_ADDRESS,
        addressExtra: document.getElementById('addressExtra')?.value.trim() || '',
        comment: document.getElementById('comment').value.trim(),
        paymentMethod,
        pickupTimeMode,
        pickupTimeAt: pickupTimeMode === 'at' ? pickupTimeAt : '',
        promoCode: meta.promoCode || '',
        items: cart,
        total
      };

      try {
        const apiBase = await resolveApiBase(true);
        if (apiBase === null) {
          await refreshApiStatus();
          throw new Error(orderServerErrorMessage());
        }

        const res = await fetch(`${apiBase}/api/orders`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await parseJsonResponse(res);
        if (!res.ok) throw new Error(data.error || 'Ошибка сервера');

        localStorage.setItem('emika-checkout-contact', JSON.stringify({ name, phone }));
        localStorage.removeItem('emika-checkout-cart');
        localStorage.removeItem('emika-checkout-meta');
        localStorage.removeItem('emika-cart');
        localStorage.setItem('emika-last-order', JSON.stringify({
          orderNumber: data.orderNumber,
          id: data.id,
          total,
          paymentMethod,
          pickupTimeMode,
          pickupTimeAt: pickupTimeMode === 'at' ? pickupTimeAt : ''
        }));

        window.location.href = `order-success.html?order=${encodeURIComponent(data.orderNumber)}`;
      } catch (error) {
        err.textContent = error.message || orderServerErrorMessage();
        err.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Отправить заказ';
      }
    });
  </script>
</body>
</html>
