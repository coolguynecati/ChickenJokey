<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Заказ принят — Emika's</title>
  <link rel="shortcut icon" href="/images/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <script>
    (function () {
      const saved = localStorage.getItem('emika-theme');
      document.documentElement.setAttribute('data-theme', saved === 'light' || saved === 'dark' ? saved : 'dark');
    })();
  </script>
  <style>
    :root {
      --orange: #ff6a1a;
      --bg: #0d0d0f;
      --card: rgba(20, 20, 24, 0.92);
      --text: #f5f5f5;
      --muted: #c9c9ce;
      --line: rgba(255, 255, 255, 0.1);
      --surface-2: rgba(255, 255, 255, 0.08);
    }

    html[data-theme="light"] {
      --bg: #f6f6f7;
      --card: rgba(255, 255, 255, 0.96);
      --text: #121316;
      --muted: #545863;
      --line: rgba(0, 0, 0, 0.1);
      --surface-2: rgba(10, 10, 12, 0.06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 20px 14px 28px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', Arial, sans-serif;
    }

    html[data-theme="dark"] body {
      background: #0d0d0f url('/images/background.jpg') center top / cover no-repeat fixed;
    }

    .wrap { max-width: 920px; margin: 0 auto; }
    h1 { margin: 0 0 6px; font-size: 1.35rem; color: var(--text); }
    .sub { margin: 0 0 18px; color: var(--muted); font-size: 0.88rem; }
    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    @media (min-width: 720px) {
      .row { grid-template-columns: 1fr 1fr; max-width: 640px; }
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px 14px;
      color: var(--text);
    }
    .card h2 {
      margin: 0 0 8px;
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .num { color: var(--orange); font-weight: 700; font-size: 1.05rem; margin: 0 0 4px; }
    .sum { font-size: 1.5rem; font-weight: 700; color: var(--orange); margin: 0; }
    .line { margin: 0; font-size: 0.9rem; line-height: 1.45; color: var(--text); }
    .btn {
      display: inline-block;
      width: 100%;
      text-align: center;
      padding: 11px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      font-family: inherit;
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      text-decoration: none;
      margin-top: 8px;
      background: var(--surface-2);
      color: var(--text);
    }
    .btn:hover { border-color: rgba(255, 106, 26, 0.45); }
    .back {
      display: inline-block;
      margin-top: 16px;
      color: var(--orange);
      font-weight: 700;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .toast {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card);
      border: 1px solid rgba(255, 106, 26, 0.4);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 0.82rem;
      display: none;
    }
    .toast.show { display: block; }
    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Заказ принят</h1>
    <p class="sub">Перезвоним для подтверждения.</p>

    <div class="row" id="cardsRow">
      <div class="card">
        <h2>Заказ</h2>
        <p class="num" id="orderNum">—</p>
        <p class="sum" id="orderSum">—</p>
        <p class="line muted" id="pickupLine" style="color:var(--muted);font-size:0.85rem;margin-top:8px;"></p>
      </div>

      <div class="card" id="transferCard" hidden>
        <h2>Перевод</h2>
        <p class="line" id="phoneDisplay"></p>
        <button type="button" class="btn" id="copyPayBtn">Скопировать для перевода</button>
      </div>

      <div class="card" id="counterCard" hidden>
        <h2>Касса</h2>
        <p class="line"><strong id="venueName">Eat Arena</strong></p>
        <p class="line" style="color:var(--muted);font-size:0.85rem;" id="venueAddress"></p>
      </div>
    </div>

    <a class="back" href="./">← В меню</a>
  </div>

  <p class="toast" id="toast">Скопировано</p>

  <script>
    const params = new URLSearchParams(location.search);
    const orderFromUrl = params.get('order');
    let order = null;

    try {
      const raw = localStorage.getItem('emika-last-order');
      if (raw) order = JSON.parse(raw);
    } catch (_) {}

    const orderNum = orderFromUrl || order?.orderNumber || '—';
    document.getElementById('orderNum').textContent = orderNum;

    if (order?.total) {
      document.getElementById('orderSum').textContent = `${order.total} ₽`;
    }

    function pickupLabel(o) {
      if (!o) return '';
      if (o.pickupTimeMode === 'hour') return 'В течение часа';
      if (o.pickupTimeMode === 'at' && o.pickupTimeAt) return `К ${o.pickupTimeAt}`;
      return 'Как можно скорее';
    }

    const pickupLine = document.getElementById('pickupLine');
    if (order) pickupLine.textContent = `Самовывоз: ${pickupLabel(order)}`;

    const payPhone = '+7 977 838 98 98';
    const isTransfer = order?.paymentMethod === 'transfer';

    if (isTransfer) {
      document.getElementById('transferCard').hidden = false;
      document.getElementById('phoneDisplay').textContent = payPhone;
    } else {
      document.getElementById('counterCard').hidden = false;
      document.getElementById('venueAddress').textContent =
        'Eat Arena, Мичуринский пр., 13А, стр. 1 — 2 этаж';
    }

    const toast = document.getElementById('toast');
    document.getElementById('copyPayBtn')?.addEventListener('click', async () => {
      const text = `${payPhone}\nЗаказ ${orderNum}\n${order?.total || ''} ₽`.trim();
      try {
        await navigator.clipboard.writeText(text);
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
      } catch (_) {}
    });
  </script>
</body>
</html>
